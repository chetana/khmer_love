steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/khmer-love-translator'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/khmer-love-translator'

substitutions:
  _GEMINI_API_KEY: ''
